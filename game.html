<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Kucing 🐱</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000;
      color: white;
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }

    .cat {
      width: 150px;
      margin-top: 20px;
      opacity: 0;
      transform: translateY(50px);
      transition: all 0.5s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<div class="container text-center mt-5">
  <h2>🎮 Tebak Angka Kucing 🐱</h2>
  <p>Tebak angka 1 - 10 biar si kucing senang 😺</p>

  <input type="number" id="guess" class="form-control w-25 mx-auto">
  
  <button onclick="checkGuess()" class="btn btn-cat mt-3">
    Tebak 🐾
  </button>

  <p id="result" class="mt-3"></p>

  <!-- KUCING -->
  <img id="catImg" class="cat" src="">
</div>

<script>
let number = Math.floor(Math.random() * 10) + 1;

function checkGuess() {
  let guess = document.getElementById("guess").value;
  let cat = document.getElementById("catImg");

  if (guess == number) {
    document.getElementById("result").innerHTML = "😺 Benar! Kucing senang!";
    cat.src = "https://i.pinimg.com/originals/7d/33/9c/7d339c8b062906efdc5f5eb17e9e82b7.jpg";
  } else {
    document.getElementById("result").innerHTML = "🙀 Salah! Kucing sedih...";
    cat.src = "https://cdn.idntimes.com/content-images/community/2022/04/12-70c6d66a74f3cea6c9573bee957f66ff-58775ab73ab4817547b20b5292c0a0d6.jpg";
  }

  // munculin animasi
  cat.classList.remove("show");
  setTimeout(() => {
    cat.classList.add("show");
  }, 50);
}
</script>

</body>
</html>
