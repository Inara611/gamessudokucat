<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Kucing 🐱</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #800000, #a52a2a);
      color: white;
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }

    .cat {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      margin-top: 20px;
      transition: 0.3s;
    }

    .navbar {
      padding: 15px 0;
    }

    .navbar .btn {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">

    <a class="navbar-brand fw-bold" href="index.html">🐱 Inara Game</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <div class="ms-auto d-flex gap-2">
        <a href="index.html" class="btn btn-outline-light">Home</a>
        <a href="profile.html" class="btn btn-outline-light">Profile</a>
        <a href="game.html" class="btn btn-outline-light">Game</a>
        <a href="contact.html" class="btn btn-outline-light">Contact</a>
      </div>
    </div>

  </div>
</nav>

<!-- GAME -->
<div class="container text-center mt-5">

  <h2>🎮 Tebak Angka Kucing 🐱</h2>
  <p>Tebak angka 1 - 10 biar si kucing senang 😺</p>

  <input id="guess" type="number" class="form-control w-25 mx-auto" min="1" max="10">

  <button onclick="checkGuess()" class="btn btn-cat mt-3">Tebak 🐾</button>
  <button onclick="resetGame()" class="btn btn-light mt-3 ms-2">Reset 🔄</button>

  <p id="result" class="mt-3"></p>

  <!-- GAMBAR ANTI ERROR -->
  <img id="catImg" class="cat"
    src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131"
    onerror="this.src='https://placekitten.com/200/200'"
    alt="kucing">

</div>

<!-- SCRIPT -->
<script>
let number = Math.floor(Math.random() * 10) + 1;

function checkGuess() {
  let guess = document.getElementById("guess").value;
  let cat = document.getElementById("catImg");

  if (guess === "" || guess < 1 || guess > 10) {
    document.getElementById("result").innerHTML = "⚠️ Masukkan angka 1 - 10!";
    return;
  }

  if (guess == number) {
    document.getElementById("result").innerHTML = "😺 Benar!";
    cat.src = "https://images.unsplash.com/photo-1518791841217-8f162f1e1131";
  } else {
    document.getElementById("result").innerHTML = "🙀 Salah!";
    cat.src = "https://images.unsplash.com/photo-1574158622682-e40e69881006";
  }
}

function resetGame() {
  number = Math.floor(Math.random() * 10) + 1;
  document.getElementById("result").innerHTML = "Reset! 😺";
  document.getElementById("guess").value = "";

  document.getElementById("catImg").src =
    "https://images.unsplash.com/photo-1518791841217-8f162f1e1131";
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
