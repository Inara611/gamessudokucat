<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Kucing 🐱</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000;
      color: white;
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }

    .cat {
      width: 150px;
      margin-top: 20px;
      opacity: 0;
      transform: translateY(50px);
      transition: all 0.5s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<div class="container text-center mt-5">
  <h2>🎮 Tebak Angka Kucing 🐱</h2>
  <p>Tebak angka 1 - 10 biar si kucing senang 😺</p>

  <input type="number" id="guess" class="form-control w-25 mx-auto" min="1" max="10">
  
  <button onclick="checkGuess()" class="btn btn-cat mt-3">
    Tebak 🐾
  </button>

  <button onclick="resetGame()" class="btn btn-light mt-3 ms-2">
    Reset 🔄
  </button>

  <p id="result" class="mt-3"></p>

  <!-- KUCING -->
  <img id="catImg" class="cat show" src="https://placekitten.com/200/200">
</div>

<script>
let number = Math.floor(Math.random() * 10) + 1;

function checkGuess() {
  let guess = document.getElementById("guess").value;
  let cat = document.getElementById("catImg");

  // validasi
  if (guess === "" || guess < 1 || guess > 10) {
    document.getElementById("result").innerHTML = "⚠️ Masukkan angka 1 - 10!";
    return;
  }

  if (guess == number) {
    document.getElementById("result").innerHTML = "😺 Benar! Kucing senang!";
    cat.src = "https://placekitten.com/200/200";
  } else {
    document.getElementById("result").innerHTML = "🙀 Salah! Coba lagi!";
    cat.src = "https://placekitten.com/200/201";
  }

  // animasi muncul
  cat.classList.remove("show");
  setTimeout(() => {
    cat.classList.add("show");
  }, 50);
}

// reset game
function resetGame() {
  number = Math.floor(Math.random() * 10) + 1;
  document.getElementById("result").innerHTML = "Game direset! Tebak lagi 😺";
  document.getElementById("guess").value = "";

  let cat = document.getElementById("catImg");
  cat.src = "https://placekitten.com/200/202";

  cat.classList.remove("show");
  setTimeout(() => {
    cat.classList.add("show");
  }, 50);
}
</script>

</body>
</html>
