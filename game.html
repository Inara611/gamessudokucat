</head>

<body style="background-color:#800000; color:white;">

<!-- NAVBAR (SAMA KAYAK INDEX) -->

  <div class="container">

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">

<!-- GAME -->
<div class="container text-center mt-5">

  <h2>🎮 Tebak Angka Kucing 🐱</h2>
  <p>Tebak angka 1 - 10 biar si kucing senang 😺</p>

  <input id="guess" type="number" class="form-control w-25 mx-auto">

  <button onclick="checkGuess()" class="btn btn-danger mt-3">Tebak</button>
  <button onclick="resetGame()" class="btn btn-light mt-3">Reset</button>

  <p id="result" class="mt-3"></p>

  <!-- GAMBAR SUPER AMAN -->
  <img id="catImg" src="https://placekitten.com/200/200" width="150">

</div>

<!-- SCRIPT PALING AMAN -->
<script>
let number = Math.floor(Math.random() * 10) + 1;

function checkGuess() {
  let guess = document.getElementById("guess").value;

  if (!guess) {
    document.getElementById("result").innerHTML = "Isi dulu 😾";
    return;
  }

  if (guess == number) {
    document.getElementById("result").innerHTML = "😺 Benar!";
    document.getElementById("catImg").src = "https://placekitten.com/200/201";
  } else {
    document.getElementById("result").innerHTML = "🙀 Salah!";
    document.getElementById("catImg").src = "https://placekitten.com/200/202";
  }
}

function resetGame() {
  number = Math.floor(Math.random() * 10) + 1;
  document.getElementById("result").innerHTML = "Reset 😺";
  document.getElementById("guess").value = "";
  document.getElementById("catImg").src = "https://placekitten.com/200/200";
}
</script>

<!-- WAJIB -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
