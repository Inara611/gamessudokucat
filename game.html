<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container text-center mt-5">
  <h2>Game Tebak Angka</h2>
  <p>Tebak angka 1 - 10</p>

  <input type="number" id="guess" class="form-control w-25 mx-auto">
  <button onclick="checkGuess()" class="btn btn-primary mt-3">
    Tebak
  </button>

  <p id="result" class="mt-3"></p>
</div>

<script>
let number = Math.floor(Math.random() * 10) + 1;

function checkGuess() {
  let guess = document.getElementById("guess").value;

  if (guess == number) {
    document.getElementById("result").innerHTML = "Benar!";
  } else {
    document.getElementById("result").innerHTML = "Salah, coba lagi!";
  }
}
</script>

</body>
</html>
