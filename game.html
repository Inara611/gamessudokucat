<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Kucing 🐱</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000;
      color: white;
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }

    .cat {
      width: 150px;
      margin-top: 20px;
      opacity: 0;
      transform: translateY(50px);
      transition: all 0.5s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    /* tambahan biar lebih cakep */
    .card-game {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">🐱 Inara Game</a>

    <!-- Burger -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <div>
        <a href="index.html" class="btn btn-outline-light me-2">Home</a>
        <a href="profile.html" class="btn btn-outline-light me-2">Profile</a>
        <a href="game.html" class="btn btn-outline-light me-2">Game</a>
        <a href="contact.html" class="btn btn-outline-light">Contact</a>
      </div>
    </div>
  </div>
</nav>

<!-- GAME -->
<div class="container text-center mt-5">
  <div class="card-game">

    <h2>🎮 Tebak Angka Kucing 🐱</h2>
    <p>Tebak angka 1 - 10 biar si kucing senang 😺</p>

    <input 
      type="number" 
      id="guess" 
      class="form-control w-25 mx-auto text-center"
      min="1" max="10"
      placeholder="1 - 10"
      onkeypress="if(event.key === 'Enter') checkGuess()"
    >

    <button onclick="checkGuess()" class="btn btn-cat mt-3">
      Tebak 🐾
    </button>

    <button onclick="resetGame()" class="btn btn-light mt-3 ms-2">
      Reset 🔄
    </button>

    <p id="result" class="mt-3 fw-bold"></p>

    <!-- KUCING (gambar lebih stabil) -->
    <img id="catImg" class="cat show" 
      src="https://placekitten.com/200/200"
      alt="kucing lucu">
      
  </div>
</div>

<!-- JS -->
<script>
let number = Math.floor(Math.random() * 10) + 1;

function checkGuess() {
  let guess = document.getElementById("guess").value;
  let cat = document.getElementById("catImg");

  if (guess === "" || guess < 1 || guess > 10) {
    document.getElementById("result").innerHTML = "⚠️ Masukkan angka 1 - 10!";
    return;
  }

  if (guess == number) {
    document.getElementById("result").innerHTML = "😺 Benar! Kucing senang!";
    cat.src = "https://placekitten.com/200/201";
  } else {
    document.getElementById("result").innerHTML = "🙀 Salah! Coba lagi!";
    cat.src = "https://placekitten.com/200/202";
  }

  cat.classList.remove("show");
  setTimeout(() => {
    cat.classList.add("show");
  }, 50);
}

function resetGame() {
  number = Math.floor(Math.random() * 10) + 1;
  document.getElementById("result").innerHTML = "Game direset! Tebak lagi 😺";
  document.getElementById("guess").value = "";

  let cat = document.getElementById("catImg");
  cat.src = "https://placekitten.com/200/200";

  cat.classList.remove("show");
  setTimeout(() => {
    cat.classList.add("show");
  }, 50);
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
