<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile 🐱</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000;
      color: white;
    }

    .card {
      border-radius: 20px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #ffb6c1;
    }
  </style>
</head>

<body>

<div class="container text-center mt-5">
  <h2>🐱 My Profile</h2>

  <div class="card p-4 bg-light text-dark mx-auto" style="width: 18rem;">
    
    <!-- GAMBAR FIX -->
    <img src="https://placekitten.com/200/200" class="profile-img mb-3">

    <h5>Inara</h5>
    <p>Siswa SMA & Cat Lover 🐾</p>

    <button onclick="showMessage()" class="btn btn-cat">
      Klik Aku 😺
    </button>

    <p id="output" class="mt-3"></p>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("output").innerHTML = "Aku suka kucing! 🐱💖";
}
</script>

</body>
</html>
