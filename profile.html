<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile 🐱</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000;
      color: white;
    }

    .card {
      border-radius: 20px;
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }
  </style>
</head>

<body>

<div class="container text-center mt-5">
  <h2>🐱 My Profile</h2>

  <div class="card p-4 bg-light text-dark mx-auto" style="width: 18rem;">
    <img src="https://i.pinimg.com/736x/06/6f/b2/066fb2bd6a2f623a340239ed25db389d.jpg" class="rounded-circle mb-3">
    <h5>Inara</h5>
    <p>Siswa SMA & Cat Lover 🐾</p>

    <button onclick="showMessage()" class="btn btn-cat">
      Klik Aku 😺
    </button>

    <p id="output" class="mt-3"></p>
  </div>
</div>

<script>
function showMessage() {
  document.getElementById("output").innerHTML = "Aku suka kucing! 🐱💖";
}
</script>

</body>
</html>
