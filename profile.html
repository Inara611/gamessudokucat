<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile 🐱</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000;
      color: white;
    }

    .card {
      border-radius: 20px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #ffb6c1;
    }

    /* Navbar sama persis */
    .navbar {
      padding: 15px 0;
    }

    .navbar .btn {
      border-radius: 10px;
      padding: 6px 15px;
    }
  </style>
</head>

<body>

<!-- NAVBAR (SAMA PERSIS) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">

    <a class="navbar-brand fw-bold" href="index.html">🐱 Inara Game</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <div class="ms-auto d-flex gap-2">
        <a href="index.html" class="btn btn-outline-light">Home</a>
        <a href="profile.html" class="btn btn-outline-light">Profile</a>
        <a href="game.html" class="btn btn-outline-light">Game</a>
        <a href="contact.html" class="btn btn-outline-light">Contact</a>
      </div>
    </div>

  </div>
</nav>

<!-- PROFILE -->
<div class="container text-center mt-5">
  <h2>🐱 My Profile</h2>

  <div class="card p-4 bg-light text-dark mx-auto" style="width: 18rem;">
    
    <!-- FOTO SUDAH CENTER PERFECT -->
    <img 
      src="https://cdn2.thecatapi.com/images/bpc.jpg" 
      class="profile-img mb-3 d-block mx-auto"
      alt="profile kucing">

    <h5>Inara</h5>
    <p>Siswa SMA & Cat Lover 🐾</p>

    <button onclick="showMessage()" class="btn btn-cat">
      Klik Aku 😺
    </button>

    <p id="output" class="mt-3"></p>
  </div>
</div>

<!-- JS -->
<script>
function showMessage() {
  document.getElementById("output").innerHTML = "Aku suka kucing! 🐱💖";
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
