<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact 🐱</title>

  <!-- Bootstrap FIX -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000;
      color: white;
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }

    /* Navbar biar sama */
    .navbar {
      padding: 15px 0;
    }

    .navbar .btn {
      border-radius: 10px;
      padding: 6px 15px;
    }
  </style>
</head>

<body>

<!-- ✅ NAVBAR (SAMA PERSIS SEMUA HALAMAN) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">

    <a class="navbar-brand fw-bold" href="index.html">🐱 Inara Game</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <div class="ms-auto d-flex gap-2">
        <a href="index.html" class="btn btn-outline-light">Home</a>
        <a href="profile.html" class="btn btn-outline-light">Profile</a>
        <a href="game.html" class="btn btn-outline-light">Game</a>
        <a href="contact.html" class="btn btn-outline-light">Contact</a>
      </div>
    </div>

  </div>
</nav>

<!-- CONTACT -->
<div class="container mt-5">
  <h2 class="text-center">📞 Contact Me 🐾</h2>

  <div class="card p-4 bg-light text-dark mx-auto" style="max-width: 500px;">
    <form onsubmit="return showAlert()">
      <input type="text" class="form-control mb-3" placeholder="Nama" required>
      <input type="email" class="form-control mb-3" placeholder="Email" required>
      <textarea class="form-control mb-3" placeholder="Pesan" required></textarea>

      <button class="btn btn-cat w-100">Kirim 😺</button>
    </form>

    <p id="msg" class="text-center mt-3"></p>
  </div>
</div>

<!-- JS -->
<script>
function showAlert() {
  document.getElementById("msg").innerHTML = "Pesan terkirim! 🐱💌";
  return false;
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
