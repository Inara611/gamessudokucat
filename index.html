<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inara Game 🐱</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #800000; /* maroon */
      color: white;
    }

    .card {
      border-radius: 20px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .cat-img {
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
    }

    .btn-cat {
      background-color: #ffb6c1;
      border: none;
      color: black;
    }

    .btn-cat:hover {
      background-color: #ffc0cb;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">🐱 Inara Game</a>
    <div>
      <a href="index.html" class="btn btn-outline-light me-2">Home</a>
      <a href="profile.html" class="btn btn-outline-light me-2">Profile</a>
      <a href="game.html" class="btn btn-outline-light me-2">Game</a>
      <a href="contact.html" class="btn btn-outline-light">Contact</a>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="container text-center mt-5">
  <h1 class="fw-bold">Welcome To Inara Game 🐾</h1>
  <p class="lead">Tempat kumpulnya kucing-kucing imut!</p>

  <button onclick="showAlert()" class="btn btn-cat mt-3">
    Klik untuk kejutan 😺
  </button>

  <p id="message" class="mt-3"></p>
</div>

<!-- Gallery -->
<div class="container mt-5">
  <div class="row text-center">

    <div class="col-md-4 mb-4">
      <div class="card p-3 bg-light text-dark">
        <img src="https://fanicat.com/wp-content/uploads/2019/11/a-gambar-anak-kucing-persia-lucu.jpg">
        <h5 class="mt-3">Anak Kucing Lucu 😺</h5>
      </div>
    </div>

    <div class="col-md-4 mb-4">
      <div class="card p-3 bg-light text-dark">
        <img src="https://fanicat.com/wp-content/uploads/2019/11/a-gambar-anak-kucing-lucu-oranye.jpg">
        <h5 class="mt-3">Kucing Santai 🐱</h5>
      </div>
    </div>

    <div class="col-md-4 mb-4">
      <div class="card p-3 bg-light text-dark">
        <img src="https://placekitten.com/302/200" class="cat-img">
        <h5 class="mt-3"> Kucing Gemoyy🐾</h5>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="text-center mt-5 p-3">
  <p>© 2026 Inara Game | Dibuat oleh Inara 🐱</p>
</footer>

<!-- JavaScript -->
<script>
function showAlert() {
  document.getElementById("message").innerHTML = "Meow! Kamu pecinta kucing sejati 🐾💖";
}
</script>

</body>
</html>
